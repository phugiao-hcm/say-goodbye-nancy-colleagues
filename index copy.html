<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quả Cầu Kỷ Niệm của Nancy</title>
<style>
body {
  margin:0;
  overflow:hidden;
  background: radial-gradient(ellipse at bottom, #0b1a2a 0%, #000000 100%);
  font-family: 'Segoe UI', sans-serif;
  color:#fff;
}


/* ===== CỬA TRUNG HOA ===== */
.door {
  position:absolute;
  width:50%;
  height:100%;
  background: linear-gradient(135deg, #7a0000, #3b0000);
  box-shadow: inset 0 0 40px rgba(0,0,0,0.9);
  transition: transform 1.5s ease-in-out;
  z-index: 2;
}

/* viền vàng */
.door::before {
  content:"";
  position:absolute;
  inset:10px;
  border:4px solid #d4af37;
  box-shadow: inset 0 0 20px rgba(255,215,0,0.3);
}

/* hoa văn */
.door::after {
  content:"福";
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  font-size:80px;
  color:rgba(255,215,0,0.8);
  text-shadow:0 0 10px gold;
  font-weight:bold;
  opacity:0.6;
}

/* trái/phải */
.door.left {
  left:0;
  transform-origin:left;
}

.door.right {
  right:0;
  transform-origin:right;
}

/* ===== TAY NẮM TRUNG HOA ===== */
.handle {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:22px;
  height:22px;
  border-radius:50%;
  background: radial-gradient(circle, #ffd700, #b8860b);
  box-shadow:
    0 0 10px gold,
    inset 0 0 6px rgba(0,0,0,0.6);
}

/* vòng tròn xung quanh tay nắm */
.handle::after {
  content:"";
  position:absolute;
  width:40px;
  height:40px;
  border:3px solid #d4af37;
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0.8;
}

/* vị trí */
.door.left .handle {
  right:25px;
}

.door.right .handle {
  left:25px;
}

/* ánh sáng giữa khe cửa */
.light {
  position:absolute;
  width:6px;
  height:100%;
  left:50%;
  transform:translateX(-50%);
  background: linear-gradient(to bottom, #fff, #ffd700, #ff0000);
  box-shadow:
    0 0 30px #ffd700,
    0 0 80px #ff0000;
  animation: pulse 2s infinite;
}

@keyframes lightPulse {
  0% { opacity: 0.3; height: 60%; }
  50% { opacity: 1; height: 100%; }
  100% { opacity: 0.3; height: 60%; }
}

/* khi mở cửa */
#intro.open .light {
  opacity: 0;
  transition: opacity 0.5s;
}
/* ===== INTRO DOOR ===== */
#intro {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index: 9999;
  display:flex;
  align-items:center;
  justify-content:center;
  background: #000;
  overflow:hidden;
}

.door {
  position:absolute;
  width:50%;
  height:100%;
  background: linear-gradient(135deg, #111, #222);
  transition: transform 1.5s ease-in-out;
  z-index: 2;
}

.door.left {
  left:0;
  transform-origin: left;
}

.door.right {
  right:0;
  transform-origin: right;
}

.enter-text {
  position:relative;
  z-index:3;
  font-size:28px;
  color:#fff;
  text-align:center;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { opacity:0.5; transform: scale(1); }
  50% { opacity:1; transform: scale(1.1); }
  100% { opacity:0.5; transform: scale(1); }
}

/* khi mở */
#intro.open .left {
  transform: rotateY(-100deg);
}

#intro.open .right {
  transform: rotateY(100deg);
}

#intro.open .enter-text {
  opacity:0;
}


#scene {
  width:100vw;
  height:100vh;
  perspective:1000px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.sphere {
  width:400px;
  height:400px;
  position:relative;
  transform-style: preserve-3d;
  animation: rotate 25s linear infinite;
}

@keyframes rotate {
  from { transform: rotateY(0deg) rotateX(10deg); }
  to { transform: rotateY(360deg) rotateX(10deg); }
}

.item {
  position:absolute;
  width:90px;
  height:90px;
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
  transition: transform 0.3s;
}

.item img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.item:hover {
  transform: scale(1.2);
  z-index:10;
}

/* Modal */
.modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  padding:20px;
  z-index:999;
}

.modal .text {
  font-size:20px;
  text-align:center;
  margin-top:20px;
  line-height:1.5;
  padding:0 10px;
}

.modal img {
  max-width:90%;
  max-height:80%;
  border-radius:16px;
  margin-bottom:20px;
  margin-right:20px;
  object-fit:scale-down;
}


.close {
  position: absolute;
  top: calc(20px + env(safe-area-inset-top));
  right: 50px;
  font-size: 30px;
  cursor: pointer;
}

@media (max-width:768px){
  .sphere { width:280px; height:280px; }
  .item { width:70px; height:70px; }
  .modal .text { font-size:18px; }
}

/* Snow background */
/* ===== STARS BACKGROUND ===== */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: transparent;
  z-index: 0;
}

.stars::before,
.stars::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: transparent;
  box-shadow:
    2px 2px #fff,
    50px 80px #fff,
    120px 150px #fff,
    200px 300px #fff,
    300px 200px #fff,
    400px 100px #fff,
    500px 250px #fff,
    600px 400px #fff,
    700px 150px #fff,
    800px 350px #fff;
  animation: twinkle 5s infinite alternate;
  opacity: 0.7;
}

@keyframes twinkle {
  from { opacity: 0.3; }
  to { opacity: 1; }
}

/* ===== SNOW ===== */
.snow {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}

.snow span {
  position: absolute;
  top: -10px;
  color: white;
  font-size: 10px;
  animation: snowFall linear infinite;
}

@keyframes snowFall {
  to {
    transform: translateY(100vh) translateX(30px);
  }
}
</style>
</head>
<body>

<div class="stars"></div>
<div class="snow"></div>

<div id="intro">
  <div class="light"></div>

  <div class="door left">
    <div class="handle"></div>
  </div>

  <div class="door right">
    <div class="handle"></div>
  </div>

  <div class="enter-text">Chạm vào tay nắm để mở ✨</div>
</div>


<div id="scene">
  <div class="sphere" id="sphere"></div>
</div>

<div class="modal" id="modal">
  <div class="close" onclick="closeModal()">✖</div>
  <img id="modalImg">
  <div class="text" id="modalText"></div>
</div>

<script>

  const intro = document.getElementById('intro');

intro.addEventListener('click', () => {
  intro.classList.add('open');

  // sau khi mở xong thì ẩn luôn
  setTimeout(() => {
    intro.style.display = 'none';
  }, 1500);
});

const data = [
   {img:'images/87.jpg', text:'Cảm ơn mọi người vì đã đồng hành 💼'},
  {img:'images/88.jpg', text:'Những bữa trưa đáng nhớ 🍱'},
  {img:'images/89.jpg', text:'Áp lực nhưng đáng giá 💪'},
  {img:'images/90.jpg', text:'Trưởng thành hơn mỗi ngày 🌱'},
  {img:'images/91.jpg', text:'Kỷ niệm không thể quên'},
  {img:'images/92.jpg', text:'Cảm ơn Síp vì đã giúp đỡ'},
  {img:'images/93.jpg', text:'Teamwork tuyệt vời'},
  {img:'images/94.jpg', text:'Niềm vui mỗi ngày'},
  {img:'images/95.jpg', text:'Khoảnh khắc đáng nhớ'},
  {img:'images/96.jpg', text:'Cảm ơn tất cả ❤️'},
  {img:'images/97.jpg', text:'Hy vọng gặp lại'},
  {img:'images/98.jpg', text:'Chúc thành công'},
  {img:'images/99.jpg', text:'Giữ mãi ký ức'},
  {img:'images/100.jpg', text:'Tạm biệt… ❤️'}
];

const sphere = document.getElementById('sphere');
const radius = 180;

// distribute items on sphere
const total = data.length;

data.forEach((item, i) => {
  const el = document.createElement('div');
  el.className = 'item';

  const phi = Math.acos(-1 + (2 * i) / total);
  const theta = Math.sqrt(total * Math.PI) * phi;

  const x = radius * Math.cos(theta) * Math.sin(phi);
  const y = radius * Math.sin(theta) * Math.sin(phi);
  const z = radius * Math.cos(phi);

  el.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;

  el.innerHTML = `<img src="${item.img}"/>`;

  el.onclick = () => openModal(item);

  sphere.appendChild(el);
});

// drag rotate (mouse + touch)
let isDown = false;
let startX, startY, rotX = 0, rotY = 0;

// Mouse
sphere.addEventListener('mousedown', e => {
  isDown = true;
  startX = e.clientX;
  startY = e.clientY;
});

window.addEventListener('mouseup', ()=> isDown=false);

window.addEventListener('mousemove', e => {
  if(!isDown) return;
  const dx = e.clientX - startX;
  const dy = e.clientY - startY;

  rotY += dx * 0.3;
  rotX -= dy * 0.3;

  sphere.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;

  startX = e.clientX;
  startY = e.clientY;
});

// Touch (mobile)
sphere.addEventListener('touchstart', e => {
  isDown = true;
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

sphere.addEventListener('touchend', ()=> isDown=false);

sphere.addEventListener('touchmove', e => {
  if(!isDown) return;

  const touch = e.touches[0];
  const dx = touch.clientX - startX;
  const dy = touch.clientY - startY;

  rotY += dx * 0.3;
  rotX -= dy * 0.3;

  sphere.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;

  startX = touch.clientX;
  startY = touch.clientY;
});

function closeModal(){
  document.getElementById('modal').style.display='none';
}


function openModal(item){
  const modal = document.getElementById('modal');
  document.getElementById('modalImg').src = item.img;
  document.getElementById('modalText').innerText = item.text;
  modal.style.display = 'flex';
}

function closeModal(){
  document.getElementById('modal').style.display='none';
}

// expose to global for onclick
window.openModal = openModal;
window.closeModal = closeModal;


// tạo tuyết
const snowContainer = document.querySelector('.snow');

for (let i = 0; i < 100; i++) {
  const snow = document.createElement('span');
  snow.innerHTML = '❄';

  const size = Math.random() * 10 + 8;
  snow.style.fontSize = size + 'px';

  snow.style.left = Math.random() * 100 + 'vw';
  snow.style.animationDuration = (Math.random() * 5 + 5) + 's';
  snow.style.opacity = Math.random();

  snowContainer.appendChild(snow);
}

</script>

</body>
</html>
