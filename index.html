<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quả Cầu Kỷ Niệm của Nancy</title>
<style>
body {
  margin:0;
  overflow:hidden;
  background: radial-gradient(ellipse at bottom, #0b1a2a 0%, #000000 100%);
  font-family: 'Segoe UI', sans-serif;
  color:#fff;
}

#scene {
  width:100vw;
  height:100vh;
  perspective:1000px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.sphere {
  width:400px;
  height:400px;
  position:relative;
  transform-style: preserve-3d;
  animation: rotate 25s linear infinite;
}

@keyframes rotate {
  from { transform: rotateY(0deg) rotateX(10deg); }
  to { transform: rotateY(360deg) rotateX(10deg); }
}

.item {
  position:absolute;
  width:90px;
  height:90px;
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
  transition: transform 0.3s;
}

.item img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.item:hover {
  transform: scale(1.2);
  z-index:10;
}

/* Modal */
.modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  padding:20px;
  z-index:999;
}

.modal .text {
  font-size:20px;
  text-align:center;
  margin-top:20px;
  line-height:1.5;
  padding:0 10px;
}

.modal img {
  max-width:90%;
  max-height:80%;
  border-radius:16px;
  margin-bottom:20px;
  object-fit:scale-down;
}


.close {
  position: absolute;
  top: calc(20px + env(safe-area-inset-top));
  right: 50px;
  font-size: 30px;
  cursor: pointer;
}

@media (max-width:768px){
  .sphere { width:280px; height:280px; }
  .item { width:70px; height:70px; }
  .modal .text { font-size:18px; }
}

/* Snow background */
/* ===== STARS BACKGROUND ===== */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: transparent;
  z-index: 0;
}

.stars::before,
.stars::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: transparent;
  box-shadow:
    2px 2px #fff,
    50px 80px #fff,
    120px 150px #fff,
    200px 300px #fff,
    300px 200px #fff,
    400px 100px #fff,
    500px 250px #fff,
    600px 400px #fff,
    700px 150px #fff,
    800px 350px #fff;
  animation: twinkle 5s infinite alternate;
  opacity: 0.7;
}

@keyframes twinkle {
  from { opacity: 0.3; }
  to { opacity: 1; }
}

/* ===== SNOW ===== */
.snow {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}

.snow span {
  position: absolute;
  top: -10px;
  color: white;
  font-size: 10px;
  animation: snowFall linear infinite;
}

@keyframes snowFall {
  to {
    transform: translateY(100vh) translateX(30px);
  }
}
</style>
</head>
<body>

<div class="stars"></div>
<div class="snow"></div>

<div id="scene">
  <div class="sphere" id="sphere"></div>
</div>

<div class="modal" id="modal">
  <div class="close" onclick="closeModal()">✖</div>
  <img id="modalImg">
  <div class="text" id="modalText"></div>
</div>

<script>

const data = [
   {img:'images/87.jpg', text:'Cảm ơn mọi người vì đã đồng hành 💼'},
  {img:'images/88.jpg', text:'Những bữa trưa đáng nhớ 🍱'},
  {img:'images/89.jpg', text:'Áp lực nhưng đáng giá 💪'},
  {img:'images/90.jpg', text:'Trưởng thành hơn mỗi ngày 🌱'},
  {img:'images/91.jpg', text:'Kỷ niệm không thể quên'},
  {img:'images/92.jpg', text:'Cảm ơn Síp vì đã giúp đỡ'},
  {img:'images/93.jpg', text:'Teamwork tuyệt vời'},
  {img:'images/94.jpg', text:'Niềm vui mỗi ngày'},
  {img:'images/95.jpg', text:'Khoảnh khắc đáng nhớ'},
  {img:'images/96.jpg', text:'Cảm ơn tất cả ❤️'},
  {img:'images/97.jpg', text:'Hy vọng gặp lại'},
  {img:'images/98.jpg', text:'Chúc thành công'},
  {img:'images/99.jpg', text:'Giữ mãi ký ức'},
  {img:'images/100.jpg', text:'Tạm biệt… ❤️'}
];

const sphere = document.getElementById('sphere');
const radius = 180;

// distribute items on sphere
const total = data.length;

data.forEach((item, i) => {
  const el = document.createElement('div');
  el.className = 'item';

  const phi = Math.acos(-1 + (2 * i) / total);
  const theta = Math.sqrt(total * Math.PI) * phi;

  const x = radius * Math.cos(theta) * Math.sin(phi);
  const y = radius * Math.sin(theta) * Math.sin(phi);
  const z = radius * Math.cos(phi);

  el.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;

  el.innerHTML = `<img src="${item.img}"/>`;

  el.onclick = () => openModal(item);

  sphere.appendChild(el);
});

// drag rotate (mouse + touch)
let isDown = false;
let startX, startY, rotX = 0, rotY = 0;

// Mouse
sphere.addEventListener('mousedown', e => {
  isDown = true;
  startX = e.clientX;
  startY = e.clientY;
});

window.addEventListener('mouseup', ()=> isDown=false);

window.addEventListener('mousemove', e => {
  if(!isDown) return;
  const dx = e.clientX - startX;
  const dy = e.clientY - startY;

  rotY += dx * 0.3;
  rotX -= dy * 0.3;

  sphere.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;

  startX = e.clientX;
  startY = e.clientY;
});

// Touch (mobile)
sphere.addEventListener('touchstart', e => {
  isDown = true;
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

sphere.addEventListener('touchend', ()=> isDown=false);

sphere.addEventListener('touchmove', e => {
  if(!isDown) return;

  const touch = e.touches[0];
  const dx = touch.clientX - startX;
  const dy = touch.clientY - startY;

  rotY += dx * 0.3;
  rotX -= dy * 0.3;

  sphere.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;

  startX = touch.clientX;
  startY = touch.clientY;
});

function closeModal(){
  document.getElementById('modal').style.display='none';
}


function openModal(item){
  const modal = document.getElementById('modal');
  document.getElementById('modalImg').src = item.img;
  document.getElementById('modalText').innerText = item.text;
  modal.style.display = 'flex';
}

function closeModal(){
  document.getElementById('modal').style.display='none';
}

// expose to global for onclick
window.openModal = openModal;
window.closeModal = closeModal;


// tạo tuyết
const snowContainer = document.querySelector('.snow');

for (let i = 0; i < 100; i++) {
  const snow = document.createElement('span');
  snow.innerHTML = '❄';

  const size = Math.random() * 10 + 8;
  snow.style.fontSize = size + 'px';

  snow.style.left = Math.random() * 100 + 'vw';
  snow.style.animationDuration = (Math.random() * 5 + 5) + 's';
  snow.style.opacity = Math.random();

  snowContainer.appendChild(snow);
}

</script>

</body>
</html>
