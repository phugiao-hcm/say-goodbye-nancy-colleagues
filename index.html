<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good bye my team</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background: radial-gradient(circle, #0b1a2a, #000);
  color:#fff;
}

/* ===== APP CONTAINER ===== */
.app {
  max-width:500px;
  margin:auto;
  padding:16px;
  height: 100vh;
}

/* ===== HEADER ===== */
.header {
  text-align:center;
  margin-bottom:16px;
}

.title {
  font-size:24px;
  font-weight:bold;
}

.subtitle {
  font-size:14px;
  opacity:0.7;
  margin-top:4px;
}

/* ===== PROGRESS ===== */
.progress {
  height:8px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.progress-bar {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#ffd700,#ff4d4d);
  transition:0.5s;
}

/* ===== GRID ===== */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(90px,1fr));
  gap: 36px;
  margin-top:32px;
}

/* ===== GIFT ===== */
.gift {
  position:relative;
  width:100%;
  aspect-ratio:1;
  cursor:pointer;
}

/* rung */
.gift.shake {
  animation:shake 0.5s;
}
@keyframes shake {
  0%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  50%{transform:translateX(5px)}
  75%{transform:translateX(-5px)}
  100%{transform:translateX(0)}
}

/* box */
.box {
  width:100%;
  height:100%;
  background: linear-gradient(135deg,#ff0000,#8b0000);
  border-radius:14px;
}

/* ribbon */
.box::before {
  content:"";
  position:absolute;
  width:100%;
  height:20%;
  top:40%;
  background:#ffd700;
}
.box::after {
  content:"";
  position:absolute;
  width:20%;
  height:100%;
  left:40%;
  background:#ffd700;
}

/* lid */
.lid {
  position:absolute;
  width:100%;
  height:30%;
  background:#ff4d4d;
  top:-20%;
  border-radius:12px;
  transition:0.5s;
}

.gift.open .lid {
  transform: rotateX(120deg);
}

/* glow */
.gift.open::after {
  content:"";
  position:absolute;
  inset:0;
  background: radial-gradient(circle, rgba(255,215,0,0.6), transparent);
  animation: glow 1s;
}
@keyframes glow {
  from{opacity:1}
  to{opacity:0}
}

/* number */
.number {
  position:absolute;
  bottom:5px;
  right:8px;
  font-size:12px;
  opacity:0.8;
}

/* ===== MODAL ===== */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:20px;
}

.modal img {
  max-width:90%;
  max-height:70%;
  border-radius:16px;
}

.modal .text {
  margin-top:20px;
  font-size:20px;
  text-align:center;
}

.close {
  position:absolute;
  top:20px;
  right:20px;
  font-size:30px;
  cursor:pointer;
}

/* ===== RESPONSIVE ===== */
@media (max-width:480px){
  .title { font-size:20px; }
  .modal .text { font-size:18px; }
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <div class="title">🎁 Kỷ Niệm Polytex cùng Nancy</div>
    <div class="subtitle">Mỗi hộp quà là một ký ức</div>

    <div class="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

</div>

<div class="modal" id="modal">
  <div class="close" onclick="closeModal()">✖</div>
  <img id="modalImg">
  <div class="text" id="modalText"></div>
</div>

<script>

const data = [
  {img:'images/87.jpg', text:'Sinh nhật sếp 22/1 🎂'},
  {img:'images/88.jpg', text:'Sếp dẫn đi ăn noel 2025 🤭'},
  {img:'images/89.jpg', text:'With Lleo Lleo nè'},
  {img:'images/90.jpg', text:'Bái bai'},
  {img:'images/91.jpg', text:'Góc làm việc của Nancy'},
  {img:'images/92.jpg', text:'Mừng sếp thăng chức'},
  {img:'images/93.jpg', text:'Được đi ăn Kichi Kichi nè'},
  {img:'images/94.jpg', text:'1 2 3 dzô nè'},
  {img:'images/95.jpg', text:'Trao đổi quà noel🎁'},
  {img:'images/96.jpg', text:'Nancy cảm ơn mn nhó😘'},
  {img:'images/97.jpg', text:'Quà sịn sịn🎄🎄'},
  {img:'images/98.jpg', text:'Team mình đi ăn tất niên nè'},
  {img:'images/99.jpg', text:'Đáng yeoo'},
  {img:'images/100.jpg', text:'Hoàng hôn tại Polytex k có tăng ca🫢'}
];

const grid = document.getElementById('grid');
const progressBar = document.getElementById('progressBar');

let opened = 0;

data.forEach((item,i)=>{
  const gift=document.createElement('div');
  gift.className='gift';

  gift.innerHTML=`
    <div class="lid"></div>
    <div class="box"></div>
    <div class="number">${i+1}</div>
  `;

gift.onclick=()=>{

  // luôn cho mở lại
  gift.classList.remove('open');

  gift.classList.add('shake');

  setTimeout(()=>{
    gift.classList.remove('shake');
    gift.classList.add('open');

    createConfetti(gift);

    // chỉ tăng progress lần đầu
    if(!gift.dataset.opened){
      gift.dataset.opened = "true";
      opened++;
      updateProgress();
    }

    setTimeout(()=>openModal(item),400);
  },400);
};

  grid.appendChild(gift);
});

function updateProgress(){
  const percent = (opened / data.length) * 100;
  progressBar.style.width = percent + '%';
}

// confetti
function createConfetti(el){
  for(let i=0;i<15;i++){
    const c=document.createElement('div');
    c.style.position='absolute';
    c.style.width='6px';
    c.style.height='6px';
    c.style.background=`hsl(${Math.random()*360},100%,50%)`;
    c.style.left=Math.random()*100+'%';
    c.style.top='0';
    c.style.animation='fall 1s linear';
    el.appendChild(c);
    setTimeout(()=>c.remove(),1000);
  }
}

// modal
function openModal(item){
  modal.style.display='flex';
  modalImg.src=item.img;
  modalText.innerText=item.text;
}

function closeModal(){
  modal.style.display='none';
}

</script>

</body>
</html>
